name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: courier-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            artifact: courier-linux-aarch64
    runs-on: [self-hosted, guvnor]
    steps:
      - uses: actions/checkout@v4

      - name: Configure aarch64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p ~/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build release binary (standard)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package standard binary
        run: |
          cp target/${{ matrix.target }}/release/courier ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
          sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Build release binary (with intelligence)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        continue-on-error: true
        id: smart_build
        run: cargo build --release --features intelligence --target ${{ matrix.target }}

      - name: Package intelligence binary
        if: matrix.target == 'x86_64-unknown-linux-gnu' && steps.smart_build.outcome == 'success'
        run: |
          cp target/${{ matrix.target }}/release/courier ${{ matrix.artifact }}-smart
          chmod +x ${{ matrix.artifact }}-smart
          sha256sum ${{ matrix.artifact }}-smart > ${{ matrix.artifact }}-smart.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
            ${{ matrix.artifact }}-smart
            ${{ matrix.artifact }}-smart.sha256

  release:
    needs: build
    runs-on: [self-hosted, guvnor]
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            courier-linux-x86_64
            courier-linux-x86_64.sha256
            courier-linux-x86_64-smart
            courier-linux-x86_64-smart.sha256
            courier-linux-aarch64
            courier-linux-aarch64.sha256
          generate_release_notes: true
